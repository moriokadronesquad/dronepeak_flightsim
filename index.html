<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRONE PEAK｜二等実地試験シミュレーター</title>
<meta name="description" content="DRONE PEAK Multicopter Flight School｜二等無人航空機操縦士 実地試験シミュレーター">
<style>
  :root{
    --pp:#473b6b;        /* ブランド紫 */
    --pp2:#5b4d86;
    --pp-d:#2d2547;
    --acc:#ffe27a;
    --txt:#e9e6f3;
    --line:#6a5da0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;font-family:"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;color:var(--txt);overflow:hidden}
  body{background:radial-gradient(120% 120% at 50% 0%, #1b1630 0%, #120e22 60%, #0a0816 100%);}
  #stage{position:fixed;inset:0;z-index:0}
  #ui{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:24px;pointer-events:none}
  #ui > *{pointer-events:auto}
  .logo3d-space{height:46vh;min-height:240px;width:100%}
  h1{font-size:clamp(34px,6vw,68px);font-weight:700;letter-spacing:.06em;
     background:linear-gradient(180deg,#fff 0%,#cfc6f2 100%);-webkit-background-clip:text;background-clip:text;color:transparent;
     text-shadow:0 2px 30px rgba(120,100,200,.35);margin-top:-10px}
  h1 .reg{font-weight:400}
  h1 .bold{font-weight:800}
  .sub{font-size:clamp(13px,2.2vw,18px);color:#b9b0e0;letter-spacing:.08em;margin-top:6px}
  .sub2{font-size:clamp(11px,1.8vw,13px);color:#8a82b3;letter-spacing:.18em;margin-top:4px}

  /* カード（ゲート） */
  .card{margin-top:26px;width:min(440px,92vw);background:rgba(30,24,52,.82);
        border:1px solid var(--line);border-radius:16px;padding:22px 22px 18px;
        box-shadow:0 18px 50px rgba(0,0,0,.5);backdrop-filter:blur(6px)}
  .card h2{font-size:15px;color:var(--acc);margin-bottom:12px;font-weight:700}
  .keyrow{display:flex;gap:8px}
  input[type=text]{flex:1;background:#0e0b1c;border:1px solid var(--line);color:#fff;
        border-radius:10px;padding:12px 14px;font-size:16px;letter-spacing:.12em;text-align:center;outline:none}
  input[type=text]:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(255,226,122,.18)}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-weight:700;transition:filter .15s,transform .05s}
  button:active{transform:translateY(1px)}
  .btn-key{background:var(--pp2);color:#fff;padding:0 18px;font-size:15px}
  .btn-key:hover{filter:brightness(1.15)}
  .btn-launch{display:block;width:100%;margin-top:6px;background:linear-gradient(180deg,#2bb673,#1e9e62);
        color:#fff;padding:15px;font-size:18px;letter-spacing:.08em}
  .btn-launch:hover{filter:brightness(1.08)}
  .msg{min-height:18px;font-size:13px;margin-top:10px}
  .msg.err{color:#ff8f8f}
  .msg.ok{color:#7fe6a6}
  .hint{font-size:11px;color:#9a92c2;margin-top:10px;line-height:1.6}
  .relink{display:inline-block;margin-top:10px;font-size:11px;color:#b9b0e0;text-decoration:underline;cursor:pointer;background:none}
  .agree{display:flex;align-items:flex-start;gap:8px;font-size:11px;color:#a89fd0;margin-top:12px;text-align:left;line-height:1.6}
  .agree a{color:#cfc6f2}
  .agree input{margin-top:2px}
  footer{position:fixed;left:0;right:0;bottom:0;z-index:2;text-align:center;font-size:11px;color:#6f6796;padding:10px}
  footer a{color:#8a82b3}
  .badge{position:fixed;top:14px;left:14px;z-index:2;font-size:11px;color:#8a82b3;letter-spacing:.15em}
  .hidden{display:none!important}
  @media(max-height:620px){.logo3d-space{height:34vh;min-height:170px}}
</style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div class="badge">DRONEPEAK MULTICOPTER FLIGHT SCHOOL</div>

  <div id="ui">
    <div class="logo3d-space" aria-hidden="true"></div>
    <h1><span class="reg">DRONE</span>&nbsp;<span class="bold">PEAK</span></h1>
    <div class="sub">二等無人航空機操縦士　実地試験シミュレーター</div>
    <div class="sub2">MULTICOPTER FLIGHT SCHOOL</div>

    <!-- 認証ゲート -->
    <div class="card" id="gate">
      <h2>🔑 アクティベーション</h2>
      <div class="keyrow">
        <input type="text" id="keyInput" placeholder="アクティベーションキーを入力" autocomplete="off" spellcheck="false">
        <button class="btn-key" id="keyBtn">認証</button>
      </div>
      <label class="agree"><input type="checkbox" id="agreeChk">
        <span><a href="#" id="termsLink">利用規約・再配布禁止</a>に同意します（受講者本人の学習目的にのみ使用し、ファイルの再配布・再販・公開を行いません）</span>
      </label>
      <div class="msg" id="gateMsg"></div>
      <div class="hint">キーはお持ちのスクール（DRONE PEAK）から配布されます。</div>
    </div>

    <!-- 認証済み：起動 -->
    <div class="card hidden" id="launchCard">
      <h2>✅ 認証済み</h2>
      <button class="btn-launch" id="launchBtn">シミュレーターを起動</button>
      <span class="relink" id="resetLink">別のキーで認証し直す</span>
    </div>
  </div>

  <footer>
    © 2026 DRONE PEAK / 湊運輸倉庫　｜　受講者本人の学習用途に限定　｜
    <a href="./LICENSE" target="_blank">LICENSE</a>・<a href="./README.md" target="_blank">README</a>
  </footer>

  (function logo3d(){
    if(typeof THREE==='undefined') return;
    const canvas=document.getElementById('stage');
    const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(38,1,0.1,100);
    camera.position.set(0,0.15,6.2);

    // ライト（押し出しの陰影を出す）
    scene.add(new THREE.AmbientLight(0xffffff,0.55));
    const key=new THREE.DirectionalLight(0xffffff,1.1); key.position.set(3,4,5); scene.add(key);
    const rim=new THREE.DirectionalLight(0xa99cff,0.9); rim.position.set(-4,-1,2); scene.add(rim);
    const fill=new THREE.PointLight(0xffe27a,0.5,30); fill.position.set(0,2,4); scene.add(fill);

    // 角丸スクエアの押し出し本体（メダル状）
    function roundedRect(s,x,y,w,h,r){
      s.moveTo(x,y+r); s.lineTo(x,y+h-r); s.quadraticCurveTo(x,y+h,x+r,y+h);
      s.lineTo(x+w-r,y+h); s.quadraticCurveTo(x+w,y+h,x+w,y+h-r);
      s.lineTo(x+w,y+r); s.quadraticCurveTo(x+w,y,x+w-r,y);
      s.lineTo(x+r,y); s.quadraticCurveTo(x,y,x,y+r);
    }
    const W=1.9, R=0.42;
    const shape=new THREE.Shape(); roundedRect(shape,-W/2,-W/2,W,W,R);
    const body=new THREE.ExtrudeGeometry(shape,{depth:0.42,bevelEnabled:true,
        bevelThickness:0.07,bevelSize:0.07,bevelSegments:4,curveSegments:24});
    body.center();
    const bodyMat=new THREE.MeshStandardMaterial({color:0x473b6b,roughness:0.45,metalness:0.25});
    const slab=new THREE.Mesh(body,bodyMat);

    // 前面・背面にエンブレム画像
    const tex=new THREE.TextureLoader().load(EMBLEM_DATAURI);
    tex.anisotropy=8;
    const faceMat=new THREE.MeshStandardMaterial({map:tex,transparent:true,roughness:0.5,metalness:0.1});
    const faceGeo=new THREE.PlaneGeometry(W*0.99,W*0.99);
    const front=new THREE.Mesh(faceGeo,faceMat); front.position.z=0.30;
    const back=new THREE.Mesh(faceGeo,faceMat);  back.position.z=-0.30; back.rotation.y=Math.PI;

    const group=new THREE.Group();
    group.add(slab,front,back);
    scene.add(group);

    // 大きさをビューに合わせる
    function fit(){
      const sp=document.querySelector('.logo3d-space').getBoundingClientRect();
      const w=innerWidth, h=innerHeight;
      renderer.setSize(w,h,false);
      camera.aspect=w/h; camera.updateProjectionMatrix();
      // ロゴをスペース中央上部へ配置（画面座標→ワールドへ簡易換算）
      const cy=(sp.top+sp.height*0.5);
      const ndcY=1-(cy/h)*2;
      group.position.y=ndcY*2.4;
      const s=Math.min(1.25, Math.max(0.7, w/900));
      group.scale.setScalar(s);
    }
    addEventListener('resize',fit); fit();

    // ランダムな回転（滑らかにドリフトする角速度でタンブリング）
    const seed=Math.random()*1000;
    let wx=0.5+Math.random()*0.4, wy=0.7+Math.random()*0.5, wz=0.15+Math.random()*0.2;
    let last=performance.now();
    function animate(now){
      const dt=Math.min(0.05,(now-last)/1000); last=now;
      const t=now/1000+seed;
      // 角速度をゆっくり揺らして“ランダム”な転がりに
      const ax=wx+0.35*Math.sin(t*0.31), ay=wy+0.30*Math.sin(t*0.23+1.7), az=wz+0.20*Math.sin(t*0.17+0.5);
      group.rotation.x+=dt*ax*0.6;
      group.rotation.y+=dt*ay*0.7;
      group.rotation.z+=dt*az*0.3;
      group.position.x=Math.sin(t*0.4)*0.12;            // ふわっと浮遊
      fill.position.x=Math.sin(t*0.6)*2.5;
      renderer.render(scene,camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  })();

  // --- SHA-256（crypto.subtle、無ければ純JS実装にフォールバック）---
  async function sha256hex(str){
    const data=new TextEncoder().encode(str);
    if(self.crypto && crypto.subtle){
      try{ const h=await crypto.subtle.digest('SHA-256',data);
        return [...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,'0')).join(''); }catch(e){}
    }
